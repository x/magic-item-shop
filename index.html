<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Keeper's Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quintessential&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Everforest dark palette */
        :root {
            --bg-dim:    #232a2e;
            --bg0:       #2d353b;
            --bg1:       #343f44;
            --bg2:       #3d484d;
            --bg3:       #475258;
            --fg:        #d3c6aa;
            --red:       #e67e80;
            --orange:    #e69875;
            --yellow:    #dbbc7f;
            --green:     #a7c080;
            --aqua:      #83c092;
            --blue:      #7fbbb3;
            --purple:    #d699b6;
            --grey0:     #7a8478;
            --grey1:     #859289;
            --grey2:     #9da9a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quintessential', serif;
            background-color: var(--bg-dim);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--bg2);
            border-radius: 8px;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--bg2);
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--yellow);
            font-weight: normal;
            letter-spacing: 0.05em;
        }

        header p {
            color: var(--grey1);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        #chat-messages {
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 300px;
            max-height: 60vh;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .message .role {
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        .message.user .role {
            color: var(--blue);
        }

        .message.assistant .role {
            color: var(--orange);
        }

        .message .content {
            background-color: var(--bg1);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Markdown prose inside assistant messages */
        .message.assistant .content p { margin-bottom: 0.5rem; }
        .message.assistant .content p:last-child { margin-bottom: 0; }
        .message.assistant .content strong { color: var(--yellow); font-weight: bold; }
        .message.assistant .content em { color: var(--aqua); font-style: italic; }
        .message.assistant .content ul, .message.assistant .content ol {
            margin: 0.4rem 0 0.5rem 1.2rem;
        }
        .message.user .content { white-space: pre-wrap; }

        .message.user .content {
            border-left: 3px solid var(--blue);
        }

        .message.assistant .content {
            border-left: 3px solid var(--orange);
        }

        #loading {
            display: none;
            color: var(--grey1);
            font-style: italic;
            padding: 0.25rem 1.5rem 0;
        }

        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--bg2);
        }

        #message-input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid var(--bg3);
            border-radius: 6px;
            background-color: var(--bg0);
            color: var(--fg);
            font-family: 'Quintessential', serif;
            font-size: 0.95rem;
            outline: none;
        }

        #message-input:focus {
            border-color: var(--yellow);
        }

        #message-input::placeholder {
            color: var(--grey0);
        }

        button {
            padding: 0.7rem 1.5rem;
            border: 1px solid var(--bg3);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Quintessential', serif;
            font-size: 0.95rem;
        }

        #send-btn {
            background-color: var(--bg2);
            color: var(--yellow);
        }

        #send-btn:hover {
            background-color: var(--bg3);
        }

        #clear-btn {
            background-color: transparent;
            color: var(--grey1);
            border-color: transparent;
            font-size: 0.8rem;
            padding: 0.7rem 0.75rem;
        }

        #clear-btn:hover {
            color: var(--red);
        }

        /* Scrollbar */
        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        #chat-messages::-webkit-scrollbar-track {
            background: var(--bg-dim);
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background: var(--bg3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>The Keeper's Shop</h1>
            <p>Curious things for curious people</p>
        </header>

        <div id="chat-messages"></div>
        <div id="loading">Searching the shelves...</div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Ask about a magic item..." autofocus>
            <button id="send-btn">Ask</button>
            <button id="clear-btn">Clear</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('chat-messages');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const loading = document.getElementById('loading');

        let sessionId = localStorage.getItem('session_id');

        function addMessage(role, content) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const roleLabel = document.createElement('div');
            roleLabel.className = 'role';
            roleLabel.textContent = role === 'user' ? 'You' : 'Shopkeeper';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            if (role === 'assistant') {
                contentDiv.innerHTML = marked.parse(content);
            } else {
                contentDiv.textContent = content;
            }

            msg.appendChild(roleLabel);
            msg.appendChild(contentDiv);
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';
            loading.style.display = 'block';
            sendBtn.disabled = true;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId }),
                });
                const data = await res.json();
                sessionId = data.session_id;
                localStorage.setItem('session_id', sessionId);
                addMessage('assistant', data.response);
            } catch (err) {
                addMessage('assistant', 'The shop flickers... something went wrong.');
            }

            loading.style.display = 'none';
            sendBtn.disabled = false;
            input.focus();
        }

        async function clearChat() {
            if (sessionId) {
                await fetch('/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId }),
                });
            }
            sessionId = null;
            localStorage.removeItem('session_id');
            messagesDiv.innerHTML = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', clearChat);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
